# CI test gate — runs the full test suite on every push and PR.
# Full matrix covering every declared classifier version.
name: Tests

on:
  push:
    branches: [main]
    tags-ignore: ['**']   # Tag pushes handled by publish.yml, not CI
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 15
    # Full Python-version matrix on Linux; latest-only on Windows/macOS
    # to verify cross-OS without burning 15 runner-minutes.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: pip install hypothesis pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short -k 'not test_fuzz'

      - name: Run fuzz tests
        run: python -m pytest tests/test_fuzz.py -v --tb=short

  # Smoke test: install the wheel and verify entry points + packaging.
  # Catches regressions that source-tree pytest misses (missing py.typed,
  # broken entry_points, bad MANIFEST, etc.).
  package:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Build and install wheel
        run: pip install .

      - name: Smoke test — CLI entry points
        run: |
          aiir --version
          aiir-mcp-server --version

      - name: Smoke test — receipt in a git repo
        shell: bash
        run: |
          TMPDIR=$(python -c "import tempfile; print(tempfile.mkdtemp())")
          cd "$TMPDIR"
          git init && git config user.email ci@test && git config user.name CI
          echo hello > file.txt && git add . && git commit -m "init"
          aiir --pretty
          python -c "import pathlib, sys; sys.exit(0 if pathlib.Path('.aiir/receipts.jsonl').exists() else 1)" || { echo 'FAIL: ledger not created'; exit 1; }
          python -c "import pathlib, sys; sys.exit(0 if pathlib.Path('.aiir/index.json').exists() else 1)" || { echo 'FAIL: index not created'; exit 1; }
          aiir -o .receipts/
          aiir --verify .receipts/*.json

      - name: Verify py.typed marker
        run: python -c "from pathlib import Path; import aiir; p = Path(aiir.__file__).parent / 'py.typed'; assert p.exists(), f'py.typed missing at {p}'"

  # ── Summary gate — single required check for branch protection ────
  # Depends on every matrix job + package.  Adds zero wall-clock time
  # because it only runs after the slowest parallel job finishes, and
  # the job itself is a no-op (~2 s).
  #
  # Branch protection requires: ci-ok
  # This means ALL 4,228 test executions (604 × 7 matrix cells) plus
  # the package smoke test must pass before a PR can merge.
  ci-ok:
    if: always()
    needs: [test, package]
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          # Fail if ANY needed job was not successful.
          # "result" is one of: success, failure, cancelled, skipped.
          echo "test:    ${{ needs.test.result }}"
          echo "package: ${{ needs.package.result }}"
          if [[ "${{ needs.test.result }}" != "success" || "${{ needs.package.result }}" != "success" ]]; then
            echo "::error::CI gate failed — one or more jobs did not succeed"
            exit 1
          fi
          echo "✅ All CI jobs passed"
