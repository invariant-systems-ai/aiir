# R4-01: CI test gate — runs the full test suite on every push and PR.
# Without this, regressions can be merged undetected.
# R6-01: Full matrix covering every declared classifier version.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip  # R6-02: Cache pip downloads to speed up CI

      - name: Install test dependencies
        run: pip install hypothesis pytest

      - name: Run unit tests
        run: python -m pytest test_cli.py -v --tb=short

      - name: Run fuzz tests
        run: python -m pytest fuzz_cli.py -v --tb=short
