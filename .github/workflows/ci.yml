# CI test gate — runs the full test suite on every push and PR.
# Full matrix covering every declared classifier version.
name: Tests

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']   # Also run on version tags so publish ci-gate finds check-runs
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 15
    # Full Python-version matrix on Linux; latest-only on Windows/macOS
    # to verify cross-OS without burning 15 runner-minutes.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_fuzz.py

  # Property-based fuzz tests (Hypothesis).  Pure-Python logic with zero
  # platform-specific behaviour, so a single Ubuntu run is sufficient.
  # Generates ~53 k random/adversarial inputs across 52 test functions.
  fuzz:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install hypothesis pytest

      - name: Run fuzz tests
        run: python -m pytest tests/test_fuzz.py -v --tb=short

  # Validate all GitHub Actions workflow YAML files.  Catches syntax
  # errors, unknown action inputs, expression typos, etc. before they
  # fail at runtime.  Runs in ~5 s.
  lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          bash <(curl -sS https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          pwd >> "$GITHUB_PATH"

      - name: Lint workflows
        # Disable shellcheck integration: it raises false positives on
        # ${{ }} expressions (expanded by Actions before the shell sees them).
        run: actionlint -shellcheck="" -color

  # Coverage gate — prevents silent test coverage regressions.
  # Runs the unit tests (no fuzz) with coverage and fails if the
  # overall line coverage drops below the threshold.
  coverage:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pytest coverage

      - name: Run tests with coverage
        run: |
          coverage run --source=aiir -m pytest tests/ --ignore=tests/test_fuzz.py -q --tb=short
          coverage report --show-missing
          coverage report --fail-under=99

  # Version drift check — ensures every file that embeds the version
  # string matches __version__ in aiir/__init__.py.  Runs in ~2 s.
  # Catches drift when pre-commit hooks are bypassed (--no-verify).
  version-check:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Check version consistency
        run: python scripts/sync-version.py --check

  # Smoke test: install the wheel and verify entry points + packaging.
  # Catches regressions that source-tree pytest misses (missing py.typed,
  # broken entry_points, bad MANIFEST, etc.).
  package:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Build and install wheel
        run: pip install .

      - name: Smoke test — CLI entry points
        run: |
          aiir --version
          aiir-mcp-server --version

      - name: Smoke test — receipt in a git repo
        shell: bash
        run: |
          TMPDIR=$(python -c "import tempfile; print(tempfile.mkdtemp())")
          cd "$TMPDIR"
          git init && git config user.email ci@test && git config user.name CI
          echo hello > file.txt && git add . && git commit -m "init"
          aiir --pretty
          python -c "import pathlib, sys; sys.exit(0 if pathlib.Path('.aiir/receipts.jsonl').exists() else 1)" || { echo 'FAIL: ledger not created'; exit 1; }
          python -c "import pathlib, sys; sys.exit(0 if pathlib.Path('.aiir/index.json').exists() else 1)" || { echo 'FAIL: index not created'; exit 1; }
          aiir -o .receipts/
          aiir --verify .receipts/*.json

      - name: Verify py.typed marker
        run: python -c "from pathlib import Path; import aiir; p = Path(aiir.__file__).parent / 'py.typed'; assert p.exists(), f'py.typed missing at {p}'"

  # ── Summary gate — single required check for branch protection ────
  # Depends on every matrix job + fuzz + package.  Adds zero wall-clock
  # time because it only runs after the slowest parallel job finishes,
  # and the job itself is a no-op (~2 s).
  #
  # Branch protection requires: ci-ok
  ci-ok:
    if: always()
    needs: [test, fuzz, lint, coverage, package, version-check]
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          # Fail if ANY needed job was not successful.
          # "result" is one of: success, failure, cancelled, skipped.
          echo "test:          ${{ needs.test.result }}"
          echo "fuzz:          ${{ needs.fuzz.result }}"
          echo "lint:          ${{ needs.lint.result }}"
          echo "coverage:      ${{ needs.coverage.result }}"
          echo "package:       ${{ needs.package.result }}"
          echo "version-check: ${{ needs.version-check.result }}"
          if [[ "${{ needs.test.result }}" != "success" || \
                "${{ needs.fuzz.result }}" != "success" || \
                "${{ needs.lint.result }}" != "success" || \
                "${{ needs.coverage.result }}" != "success" || \
                "${{ needs.package.result }}" != "success" || \
                "${{ needs.version-check.result }}" != "success" ]]; then
            echo "::error::CI gate failed — one or more jobs did not succeed"
            exit 1
          fi
          echo "✅ All CI jobs passed"
