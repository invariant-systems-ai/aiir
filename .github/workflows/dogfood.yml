# Dogfood: receipt every commit to this repo
# Only trigger on push (not pull_request) to prevent execution of
# untrusted code from forks.  PRs are tested after merge via push trigger.
name: AI Commit Receipt
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  receipt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - uses: ./  # Test the local action
        id: receipt
        with:
          output-dir: .receipts/

      - name: Show results
        env:
          RECEIPT_COUNT: ${{ steps.receipt.outputs.receipt_count }}
          AI_COMMIT_COUNT: ${{ steps.receipt.outputs.ai_commit_count }}
        run: |
          echo "Receipts generated: ${RECEIPT_COUNT}"
          echo "AI-authored: ${AI_COMMIT_COUNT}"

      - name: Commit receipts back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .receipts/
          # --no-verify skips pre-commit hooks to prevent infinite loops.
          # Only commit if there are staged changes (new receipts).
          git diff --cached --quiet || git commit --no-verify -m "chore: AIIR receipts for ${GITHUB_SHA::12} [skip ci]"
          git push

      - name: Upload receipts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: receipts-${{ github.sha }}
          path: .receipts/
          retention-days: 90
