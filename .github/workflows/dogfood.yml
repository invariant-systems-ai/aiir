# Dogfood: receipt every commit to this repo
# Only trigger on push (not pull_request) to prevent execution of
# untrusted code from forks.  PRs are tested after merge via push trigger.
#
# Receipts are pushed to the orphan `receipts` branch (not main) so that
# branch protection rules don't block the github-actions[bot] push.
# Artifacts serve as a backup/second copy.
name: AI Commit Receipt
on:
  push:
    branches: [main]
    tags-ignore: ['**']   # Tag pushes handled by publish.yml, not dogfood

concurrency:
  group: dogfood-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write   # Sigstore keyless signing (OIDC)

jobs:
  receipt:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./  # Test the local action
        id: receipt
        with:
          output-dir: .receipts/

      - name: Show results
        env:
          RECEIPT_COUNT: ${{ steps.receipt.outputs.receipt_count }}
          AI_COMMIT_COUNT: ${{ steps.receipt.outputs.ai_commit_count }}
        run: |
          echo "Receipts generated: ${RECEIPT_COUNT}"
          echo "AI-authored: ${AI_COMMIT_COUNT}"

      # ── Verify every receipt we just generated ──
      # This is the dogfood proof: AIIR validates its own output.
      - name: Verify receipt integrity
        run: |
          FAIL=0
          for receipt in .receipts/*.json; do
            [ -f "$receipt" ] || continue
            # Skip .sigstore bundles (not receipt JSON)
            case "$receipt" in *.sigstore*) continue ;; esac
            if PYTHONPATH="$GITHUB_WORKSPACE" python -P -m aiir --verify "$receipt" --explain 2>&1; then
              echo "  ✅ $(basename "$receipt")"
            else
              echo "  ❌ $(basename "$receipt")"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::One or more receipts failed integrity verification"
            exit 1
          fi
          echo "✅ All receipts passed content-addressed integrity verification"

      # ── Chain integrity: no gaps in the receipts branch ──
      - name: Check receipt chain continuity
        run: |
          # Count receipts on the branch (if it exists) and verify
          # the new batch adds exactly the expected number of files.
          EXPECTED="${{ steps.receipt.outputs.receipt_count }}"
          ACTUAL=$(ls -1 .receipts/*.json 2>/dev/null | grep -v '.sigstore' | wc -l)
          if [ "$ACTUAL" -ne "$EXPECTED" ]; then
            echo "::warning::Receipt count mismatch: expected=${EXPECTED} actual=${ACTUAL}"
          else
            echo "✅ Receipt count matches: ${ACTUAL} receipts for this push"
          fi

      - name: Push receipts to receipts branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use a SEPARATE clone so we never switch branches on the main
          # checkout — that would break the composite action's Post Run step.
          WORK="/tmp/receipts-push"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Build an authenticated push URL.  The runner's log sanitiser
          # masks $GH_TOKEN automatically, so the token never leaks.
          #
          # Why not extraheader / credential-helper?
          # actions/checkout v4 sets http.extraheader via --add in GLOBAL
          # git config.  Our own git-config --global can't reliably
          # override multi-valued keys, and the /tmp clone doesn't
          # inherit the LOCAL config from $GITHUB_WORKSPACE.  Embedding
          # the token in the push URL side-steps all of this.
          PUSH_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code origin refs/heads/receipts >/dev/null 2>&1; then
            git clone --single-branch --branch receipts "$PUSH_URL" "$WORK"
          else
            mkdir -p "$WORK" && cd "$WORK"
            git init
            git checkout --orphan receipts
            echo '# AIIR Receipts' > README.md
            echo '' >> README.md
            echo 'Cryptographic receipts generated by the [dogfood workflow](https://github.com/invariant-systems-ai/aiir/actions/workflows/dogfood.yml).' >> README.md
            echo '' >> README.md
            echo 'Each receipt proves what AI tooling was involved in a commit to `main`.' >> README.md
            git add README.md
            git commit -m "chore: initialize receipts branch"
            git push "$PUSH_URL" receipts
          fi

          cd "$WORK"
          cp "${GITHUB_WORKSPACE}/.receipts/"* . 2>/dev/null || true
          git add *.json *.sigstore 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit -m "chore: receipts for ${GITHUB_SHA::12}"
            git push "$PUSH_URL" receipts
            echo "✅ Receipts pushed to receipts branch"
          else
            echo "ℹ️  No new receipts to commit"
          fi

      - name: Upload receipts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: receipts-${{ github.sha }}
          path: .receipts/
          retention-days: 90
