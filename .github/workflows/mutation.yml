# Mutation testing CI — validates test assertion quality.
#
# Runs mutation testing (mutmut) on security-critical modules to verify
# that surviving mutants stay below an acceptable threshold.  This catches
# weak assertions that pass on correct code but also pass on subtly wrong
# code.
#
# Schedule: weekly (Sunday 04:00 UTC) + manual dispatch + PR.
# Not included in the ci-ok gate because full mutation runs take ~20 min.
# The PR path runs only the fast _verify.py mutants (~2 min) as a smoke test.
name: Mutation Testing

on:
  schedule:
    - cron: '0 4 * * 0'   # Every Sunday at 04:00 UTC
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Minimum mutation kill rate (percent)'
        required: false
        default: '80'
  pull_request:
    branches: [main]
    paths:
      - 'aiir/_verify.py'
      - 'aiir/_detect.py'
      - 'aiir/_policy.py'
      - 'aiir/_receipt.py'
      - 'aiir/_schema.py'
      - 'tests/**'

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Smoke test: fast mutation run on _verify.py only (~2 min) ──────
  mutation-smoke:
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install mutmut pytest hypothesis

      - name: Run mutation smoke test (_verify.py only)
        run: |
          # Override mutmut config to test only _verify.py
          python3 -c "
          import sys, json
          import mutmut.__main__
          sys.argv = ['mutmut', 'run', '--max-children', '4',
                       '--paths-to-mutate', 'aiir/_verify.py']
          try:
              mutmut.__main__.cli()
          except SystemExit:
              pass  # mutmut exits non-zero when survivors exist
          "

      - name: Check smoke mutation score
        run: |
          python3 -c "
          import json, sys
          from pathlib import Path
          mutants_dir = Path('mutants/aiir')
          if not mutants_dir.exists():
              print('No mutation results found')
              sys.exit(1)
          killed = survived = 0
          for meta in mutants_dir.glob('*.meta'):
              data = json.loads(meta.read_text())
              for code in data.get('exit_code_by_key', {}).values():
                  if code is None: continue
                  elif code == 0: survived += 1
                  else: killed += 1
          tested = killed + survived
          if tested == 0:
              print('No mutants tested')
              sys.exit(1)
          score = killed / tested * 100
          print(f'Mutation score: {score:.1f}% ({killed}/{tested})')
          # Smoke threshold is lenient — full run enforces stricter gate
          if score < 75:
              print(f'::error::Mutation score {score:.1f}% is below 75% threshold')
              sys.exit(1)
          print('✅ Smoke mutation score acceptable')
          "

  # ── Full mutation run (weekly + manual) ─────────────────────────────
  mutation-full:
    if: github.event_name != 'pull_request'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install mutmut pytest hypothesis

      - name: Run full mutation test
        run: |
          python3 -c "
          import sys
          import mutmut.__main__
          sys.argv = ['mutmut', 'run', '--max-children', '4']
          try:
              mutmut.__main__.cli()
          except SystemExit:
              pass
          "

      - name: Check mutation score against threshold
        env:
          THRESHOLD: ${{ github.event.inputs.threshold || '80' }}
        run: |
          python3 -c "
          import json, sys, os
          from pathlib import Path
          threshold = float(os.environ.get('THRESHOLD', '80'))
          mutants_dir = Path('mutants/aiir')
          if not mutants_dir.exists():
              print('No mutation results found')
              sys.exit(1)
          killed = survived = 0
          module_stats = {}
          for meta in sorted(mutants_dir.glob('*.meta')):
              data = json.loads(meta.read_text())
              stem = meta.stem
              mk = ms = 0
              for code in data.get('exit_code_by_key', {}).values():
                  if code is None: continue
                  elif code == 0: ms += 1; survived += 1
                  else: mk += 1; killed += 1
              module_stats[stem] = (mk, ms)
          tested = killed + survived
          if tested == 0:
              print('No mutants tested')
              sys.exit(1)
          score = killed / tested * 100
          print('═══ Mutation Testing Results ═══')
          for name, (k, s) in module_stats.items():
              t = k + s
              mscore = k / t * 100 if t > 0 else 100
              status = '✅' if mscore >= threshold else '⚠️'
              print(f'  {status} {name}: {mscore:.1f}% ({k}/{t} killed)')
          print()
          print(f'Overall: {score:.1f}% ({killed}/{tested} killed)')
          print(f'Threshold: {threshold}%')
          if score < threshold:
              print(f'::error::Mutation score {score:.1f}% is below {threshold}% threshold')
              sys.exit(1)
          print('✅ Mutation score meets threshold')
          "

      - name: Show survivors
        if: always()
        run: |
          python3 -c "
          import json
          from pathlib import Path
          mutants_dir = Path('mutants/aiir')
          if not mutants_dir.exists(): exit(0)
          found = False
          for meta in sorted(mutants_dir.glob('*.meta')):
              data = json.loads(meta.read_text())
              for name, code in data.get('exit_code_by_key', {}).items():
                  if code == 0:
                      if not found:
                          print('═══ Surviving Mutants ═══')
                          found = True
                      print(f'  SURVIVED: {name}')
          if not found:
              print('No survivors — all tested mutants killed! 🎯')
          "
