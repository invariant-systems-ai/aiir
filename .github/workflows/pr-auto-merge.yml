# Emit an AI gate status for first-party PRs and queue auto-merge only after
# Copilot review plus required CI pass.
#
# Policy:
#   - First-party PRs only -> OWNER, MEMBER, or COLLABORATOR in the same repo
#   - Copilot must review the current head commit before the AI gate passes
#   - Required status checks must be green: ci-ok, quality-ok, security-ok
#   - GitHub still enforces unresolved review threads and branch freshness
#
# Security model:
#   Uses pull_request_target and workflow_run without checking out PR code.
#   The workflow only reads PR metadata, sets a commit status, and toggles
#   auto-merge state.
name: AI Gate

on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_run:
    workflows: ["Tests", "Quality", "Security"]
    types: [completed]

permissions: read-all

jobs:
  evaluate-ai-gate:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.event == 'pull_request'
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - name: Evaluate AI merge gate
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          run_url="https://github.com/$REPO/actions/runs/$GITHUB_RUN_ID"

          evaluate_pr() {
            local pr_number="$1"
            local pr_json
            local pr_state
            local pr_draft
            local base_ref
            local head_sha
            local head_repo
            local author_login
            local pr_url
            local author_perm
            local pr_view_json
            local merge_state
            local checks_state
            local reviews_json
            local copilot_reviewed
            local review_comments_json
            local hard_rule_pattern
            local unresolved_hard_findings
            local marker
            local summary
            local existing_comment

            set_status() {
              local state="$1"
              local description="$2"
              gh api \
                --method POST \
                "repos/$REPO/statuses/$head_sha" \
                -f state="$state" \
                -f context="ai-gate" \
                -f description="$description" \
                -f target_url="$run_url" \
                >/dev/null
            }

            pr_json="$(gh api "repos/$REPO/pulls/$pr_number")"
            pr_state="$(jq -r '.state' <<<"$pr_json")"
            pr_draft="$(jq -r '.draft' <<<"$pr_json")"
            base_ref="$(jq -r '.base.ref' <<<"$pr_json")"
            head_sha="$(jq -r '.head.sha' <<<"$pr_json")"
            head_repo="$(jq -r '.head.repo.full_name' <<<"$pr_json")"
            author_login="$(jq -r '.user.login' <<<"$pr_json")"
            pr_url="$(jq -r '.html_url' <<<"$pr_json")"

            if [[ "$pr_state" != "open" || "$pr_draft" == "true" || "$base_ref" != "main" ]]; then
              echo "PR #$pr_number is not eligible for auto-merge"
              return 0
            fi

            if [[ "$head_repo" != "$REPO" ]]; then
              echo "External PR #$pr_number detected; disabling auto-merge"
              set_status success "AI gate skipped for external PR"
              gh pr merge "$pr_number" --repo "$REPO" --disable-auto || true
              return 0
            fi

            # Check author has write (push) access — more reliable than
            # author_association which GITHUB_TOKEN may report as CONTRIBUTOR
            # even for org members.
            author_perm="$(gh api "repos/$REPO/collaborators/$author_login/permission" --jq '.permission' 2>/dev/null || echo "none")"
            case "$author_perm" in
              admin|write) ;;
              *)
                echo "Author $author_login has permission '$author_perm'; not first-party"
                set_status success "AI gate skipped for non first-party author"
                gh pr merge "$pr_number" --repo "$REPO" --disable-auto || true
                return 0
                ;;
            esac

            pr_view_json="$(gh pr view "$pr_number" --repo "$REPO" --json mergeStateStatus,statusCheckRollup)"
            merge_state="$(jq -r '.mergeStateStatus' <<<"$pr_view_json")"

            checks_state="$(jq -r '
              def finished(name):
                first(.statusCheckRollup[]? | select(.name == name and .status == "COMPLETED") | .conclusion);
              def is_success(name): finished(name) == "SUCCESS";
              def is_failure(name):
                (finished(name) // "") as $c |
                ($c != "" and $c != "SUCCESS" and $c != "SKIPPED" and $c != "NEUTRAL");
              if is_success("ci-ok") and is_success("quality-ok") and is_success("security-ok") then "success"
              elif is_failure("ci-ok") or is_failure("quality-ok") or is_failure("security-ok") then "failure"
              else "pending" end
            ' <<<"$pr_view_json")"

            if [[ "$merge_state" == "BEHIND" ]]; then
              echo "PR #$pr_number branch is behind main"
              set_status pending "Branch must be updated before merge"
              gh pr merge "$pr_number" --repo "$REPO" --disable-auto || true
              return 0
            fi

            if [[ "$checks_state" == "failure" ]]; then
              echo "Required composite checks failed for PR #$pr_number"
              set_status failure "Required CI gate is failing"
              gh pr merge "$pr_number" --repo "$REPO" --disable-auto || true
              return 0
            fi

            if [[ "$checks_state" != "success" ]]; then
              echo "Required composite checks are still pending for PR #$pr_number"
              set_status pending "Waiting for required CI gate"
              gh pr merge "$pr_number" --repo "$REPO" --disable-auto || true
              return 0
            fi

            reviews_json="$(gh api "repos/$REPO/pulls/$pr_number/reviews")"
            copilot_reviewed="$(jq -r --arg sha "$head_sha" '
              any(.[ ];
                .commit_id == $sha and
                (.user.login == "copilot-pull-request-reviewer[bot]" or .user.login == "Copilot")
              )
            ' <<<"$reviews_json")"

            if [[ "$copilot_reviewed" != "true" ]]; then
              echo "Copilot has not reviewed the current head commit for PR #$pr_number"
              set_status pending "Waiting for Copilot review on current head"
              gh pr merge "$pr_number" --repo "$REPO" --disable-auto || true
              return 0
            fi

            # ── Review findings tracker ────────────────────────────────
            # Extract Copilot review comments on the current head and check
            # for unresolved hard-rule violations.  Hard rules are identified
            # by keywords from .github/copilot-review-instructions.md:
            #   - "runtime dependenc"  (rule 1)
            #   - "hmac.compare_digest" / "constant-time" (rule 2)
            #   - "hardcoded secret" / "hardcoded token" / "hardcoded key" (rule 3)
            #   - "pinned" / "40-char" / "full SHA" (rule 4)
            #   - "SPDX" (rule 5)
            #   - "sync-version" / "version consistency" (rule 6)
            # Only unresolved (not OUTDATED/DISMISSED) comments count.

            review_comments_json="$(gh api "repos/$REPO/pulls/$pr_number/comments?per_page=100")"

            hard_rule_pattern='runtime dependenc|hmac\.compare_digest|constant.time|hardcoded secret|hardcoded token|hardcoded key|pinned.*sha|40.char|full SHA|SPDX|sync-version|version consistency'

            unresolved_hard_findings="$(jq -r --arg sha "$head_sha" --arg pat "$hard_rule_pattern" '
              [.[ ] |
                select(
                  .commit_id == $sha and
                  (.user.login == "copilot-pull-request-reviewer[bot]" or .user.login == "Copilot") and
                  (.in_reply_to_id == null or .in_reply_to_id == 0) and
                  (.body | test($pat; "i"))
                ) |
                select(
                  (.resolved // false) == false and
                  (.state // "active") != "OUTDATED" and
                  (.state // "active") != "DISMISSED"
                )
              ] | length
            ' <<<"$review_comments_json")"

            if [[ "$unresolved_hard_findings" -gt 0 ]]; then
              echo "Copilot flagged $unresolved_hard_findings unresolved hard-rule violation(s) on PR #$pr_number"
              set_status failure "Copilot: $unresolved_hard_findings unresolved hard-rule finding(s)"
              gh pr merge "$pr_number" --repo "$REPO" --disable-auto || true

              marker='<!-- aiir-hard-rule-summary -->'
              summary="${marker}
            **AI Gate — Hard-Rule Findings**

            Copilot flagged **${unresolved_hard_findings}** unresolved hard-rule violation(s) on the current head (\`${head_sha:0:8}\`).

            These must be fixed before the AI gate will pass. See the inline review comments for details.
            Hard rules are defined in [\`.github/copilot-review-instructions.md\`](.github/copilot-review-instructions.md)."

              existing_comment="$(gh api "repos/$REPO/issues/$pr_number/comments?per_page=100" \
                --jq "[.[ ] | select(.body | contains(\"$marker\"))] | first | .id // empty")"

              if [[ -n "$existing_comment" ]]; then
                gh api --method PATCH "repos/$REPO/issues/comments/$existing_comment" -f body="$summary" >/dev/null
              else
                gh api --method POST "repos/$REPO/issues/$pr_number/comments" -f body="$summary" >/dev/null
              fi

              return 0
            fi

            echo "AI merge gate satisfied for $pr_url"
            set_status success "Copilot reviewed and required CI passed"
            gh pr merge "$pr_number" --repo "$REPO" --auto --squash
          }

          case "$EVENT_NAME" in
            push)
              pr_numbers="$(gh api "repos/$REPO/pulls?state=open&base=main&per_page=100" --jq '.[].number')"
              ;;
            pull_request_target|pull_request_review)
              pr_numbers="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
              ;;
            workflow_run)
              pr_numbers="$(jq -r '.workflow_run.pull_requests[].number // empty' "$GITHUB_EVENT_PATH" | sort -u)"
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME"
              exit 0
              ;;
          esac

          if [[ -z "$pr_numbers" ]]; then
            echo "No pull requests associated with this event"
            exit 0
          fi

          while IFS= read -r pr_number; do
            [[ -n "$pr_number" ]] || continue
            evaluate_pr "$pr_number"
          done <<<"$pr_numbers"
