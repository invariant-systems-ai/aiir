# Auto-merge first-party PRs after Copilot review + required CI pass.
#
# Policy:
#   - First-party PRs only -> OWNER, MEMBER, or COLLABORATOR in the same repo
#   - Copilot must review the current head commit before merge is queued
#   - Required status checks must be green: ci-ok, quality-ok, security-ok
#   - GitHub still enforces unresolved review threads and branch freshness
#
# Security model:
#   Uses pull_request_target and workflow_run without checking out PR code.
#   The workflow only reads PR metadata and toggles auto-merge state.
name: PR Auto-Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_run:
    workflows: ["Tests", "Quality", "Security"]
    types: [completed]

permissions: read-all

jobs:
  evaluate-merge-gate:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.event == 'pull_request'
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Evaluate AI merge gate
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            pull_request_target|pull_request_review)
              pr_number="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
              ;;
            workflow_run)
              pr_number="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME"
              exit 0
              ;;
          esac

          if [[ -z "$pr_number" ]]; then
            echo "No pull request associated with this event"
            exit 0
          fi

          pr_json="$(gh api "repos/$REPO/pulls/$pr_number")"
          pr_state="$(jq -r '.state' <<<"$pr_json")"
          pr_draft="$(jq -r '.draft' <<<"$pr_json")"
          base_ref="$(jq -r '.base.ref' <<<"$pr_json")"
          head_sha="$(jq -r '.head.sha' <<<"$pr_json")"
          head_repo="$(jq -r '.head.repo.full_name' <<<"$pr_json")"
          author_assoc="$(jq -r '.author_association' <<<"$pr_json")"
          pr_url="$(jq -r '.html_url' <<<"$pr_json")"

          if [[ "$pr_state" != "open" || "$pr_draft" == "true" || "$base_ref" != "main" ]]; then
            echo "PR is not eligible for auto-merge"
            exit 0
          fi

          if [[ "$head_repo" != "$REPO" ]]; then
            echo "External PR detected; disabling auto-merge"
            gh pr merge "$pr_number" --disable-auto || true
            exit 0
          fi

          case "$author_assoc" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *)
              echo "Author association is not first-party: $author_assoc"
              gh pr merge "$pr_number" --disable-auto || true
              exit 0
              ;;
          esac

          checks_json="$(gh pr view "$pr_number" --json statusCheckRollup)"
          checks_ok="$(jq -r '
            def passed(name):
              any(.statusCheckRollup[]?; .name == name and .status == "COMPLETED" and .conclusion == "SUCCESS");
            if passed("ci-ok") and passed("quality-ok") and passed("security-ok") then "yes" else "no" end
          ' <<<"$checks_json")"

          if [[ "$checks_ok" != "yes" ]]; then
            echo "Required composite checks are not all green"
            gh pr merge "$pr_number" --disable-auto || true
            exit 0
          fi

          reviews_json="$(gh api "repos/$REPO/pulls/$pr_number/reviews")"
          copilot_reviewed="$(jq -r --arg sha "$head_sha" '
            any(.[];
              .commit_id == $sha and
              (.user.login == "copilot-pull-request-reviewer[bot]" or .user.login == "Copilot")
            )
          ' <<<"$reviews_json")"

          if [[ "$copilot_reviewed" != "true" ]]; then
            echo "Copilot has not reviewed the current head commit yet"
            gh pr merge "$pr_number" --disable-auto || true
            exit 0
          fi

          echo "AI merge gate satisfied for $pr_url"
          gh pr merge "$pr_number" --auto --squash
