# Publish to PyPI when a version tag is pushed.
#
# Single workflow handles the full pipeline:
#   1. Verify CI tests passed on the tagged commit (gate)
#   2. Verify tag matches __version__
#   3. Create GitHub Release (with auto-generated notes)
#   4. Build wheel + sdist
#   5. Publish to PyPI via OIDC Trusted Publisher
#   6. Verify PyPI has the version (retries 6×)
#   7. Build & push Docker image to GHCR
#
# NOTE: This is a single workflow instead of release→publish chaining
# because GitHub Actions won't trigger workflows from events created
# by the default GITHUB_TOKEN (to prevent infinite loops).
name: Publish

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

concurrency:
  group: publish-${{ github.ref_name }}
  # Never cancel a running publish — half-published state is worse than waiting
  cancel-in-progress: false

permissions:
  contents: write  # For creating the GitHub Release

jobs:
  # ── Gate: verify CI tests passed on this commit ────────────────────
  ci-gate:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI tests to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT="${GITHUB_SHA}"
          echo "⏳ Checking CI status for commit ${COMMIT:0:12}..."

          # Poll for up to 10 minutes — CI runs in parallel from the
          # tag push (ci.yml triggers on version tags).
          for i in $(seq 1 60); do
            # Get the combined status check result for this commit
            STATUS=$(gh api "repos/${{ github.repository }}/commits/${COMMIT}/status" \
              --jq '.state' 2>/dev/null || echo "unknown")

            # Also check for check-runs (Actions use check-runs, not statuses).
            # Filter for actual CI jobs only: "test (...)" matrix jobs and the
            # "ci-ok" rollup gate.  Exclude "smoke-test" (Action Health) which
            # runs independently and should not block publishing.
            #
            # Dedup by name (keep latest started_at) so cancelled runs from
            # prior pushes don't shadow fresh runs from the tag push.
            CHECKS=$(gh api "repos/${{ github.repository }}/commits/${COMMIT}/check-runs" \
              --jq '[.check_runs[] | select(.name | test("^test \\(|^ci-ok$"; "i"))] | group_by(.name) | [.[] | sort_by(.started_at) | last] | {total: length, success: [.[] | select(.conclusion == "success")] | length, pending: [.[] | select(.status != "completed")] | length, cancelled: [.[] | select(.conclusion == "cancelled")] | length}' \
              2>/dev/null || echo '{"total":0,"success":0,"pending":0,"cancelled":0}')

            TOTAL=$(echo "$CHECKS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('total',0))")
            SUCCESS=$(echo "$CHECKS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',0))")
            PENDING=$(echo "$CHECKS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('pending',0))")
            CANCELLED=$(echo "$CHECKS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('cancelled',0))")

            echo "  Attempt $i/60: total=$TOTAL success=$SUCCESS pending=$PENDING cancelled=$CANCELLED status=$STATUS"

            if [ "$CANCELLED" -gt 0 ]; then
              echo "  ℹ️  $CANCELLED cancelled run(s) ignored (superseded by re-runs)"
            fi

            # Need at least 1 non-cancelled check, all successful, none pending
            ACTIVE=$((TOTAL - CANCELLED))
            if [ "$ACTIVE" -gt 0 ] && [ "$SUCCESS" -eq "$ACTIVE" ] && [ "$PENDING" -eq 0 ]; then
              echo "✅ CI gate passed: $SUCCESS/$ACTIVE checks successful"
              exit 0
            fi

            # If any check hard-failed (not pending, not success, not cancelled), fail fast
            FAILED=$(echo "$CHECKS" | python3 -c "
          import sys,json
          d = json.load(sys.stdin)
          f = d.get('total',0) - d.get('success',0) - d.get('pending',0) - d.get('cancelled',0)
          print(f)
          ")
            if [ "$FAILED" -gt 0 ]; then
              echo "::error::CI gate failed: $FAILED check(s) failed on ${COMMIT:0:12}"
              echo "See: https://github.com/${{ github.repository }}/commit/${COMMIT}"
              exit 1
            fi

            sleep 10
          done

          echo "::error::CI gate timed out — tests did not complete within 10 minutes for ${COMMIT:0:12}"
          echo "Push a new tag after CI passes, or re-run this workflow."
          exit 1

  # ── Gate: verify tag = code version ────────────────────────────────
  preflight:
    needs: ci-gate
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python3 -c "
          import re
          text = open('aiir/__init__.py').read()
          m = re.search(r'__version__\s*=\s*[\"\\x27]([^\"\\x27]+)', text)
          print(m.group(1))
          ")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag ($TAG) ≠ aiir/__init__.py ($PKG). Aborting."
            exit 1
          fi
          echo "✅ Tag matches: $TAG"

  # ── Step 1: Create GitHub Release ──────────────────────────────────
  release:
    needs: preflight
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Build a structured header that appears above --generate-notes content.
          # The .github/release.yml template categorizes PRs by label.
          HEADER=$(cat <<'HEADER_END'
          ## Install

          ```bash
          pip install aiir==$VERSION_PLACEHOLDER
          ```

          **GitHub Action** — `uses: invariant-systems-ai/aiir@v1`
          **Docker** — `docker run ghcr.io/invariant-systems-ai/aiir:$VERSION_PLACEHOLDER`
          **GitLab CI/CD** — [Catalog component](https://gitlab.com/explore/catalog/invariant-systems/aiir)
          HEADER_END
          )
          HEADER="${HEADER//\$VERSION_PLACEHOLDER/$VERSION}"
          # Dedent (the heredoc is indented for readability in the workflow)
          HEADER=$(echo "$HEADER" | sed 's/^          //')

          # Idempotent: if release exists, promote it to latest (un-prerelease).
          # This handles the case where a release was manually created as
          # pre-release or auto-detected as one — we always want tagged
          # semver releases to be full releases for Marketplace eligibility.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "ℹ️  Release $TAG already exists — ensuring it is marked as latest"
            gh release edit "$TAG" --prerelease=false --latest
          else
            gh release create "$TAG" \
              --title "AIIR $TAG" \
              --notes-start-tag "$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo '')" \
              --generate-notes \
              --verify-tag \
              --latest
            echo "✅ Release $TAG created"

            # Prepend the install header above the auto-generated notes
            EXISTING=$(gh release view "$TAG" --json body --jq .body)
            printf '%s\n\n%s' "$HEADER" "$EXISTING" | gh release edit "$TAG" --notes-file -
            echo "✅ Release notes enriched with install header"
          fi

  # ── Step 1b: Attach SBOM to release ────────────────────────────────
  attach-sbom:
    needs: [release, build]
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: sbom
          path: sbom/
      - name: Upload SBOM to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f sbom/aiir-sbom.cdx.json ]; then
            gh release upload "$GITHUB_REF_NAME" sbom/aiir-sbom.cdx.json \
              --clobber --repo "${{ github.repository }}"
            echo "✅ SBOM attached to release $GITHUB_REF_NAME"
          else
            echo "::warning::SBOM file not found — skipping"
          fi

  # ── Step 2: Build sdist + wheel ────────────────────────────────────
  build:
    needs: preflight
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Sync version strings
        run: python scripts/sync-version.py --check
      - name: Build
        run: pip install build && python -m build
      - name: Generate SBOM (CycloneDX)
        run: |
          pip install 'cyclonedx-bom>=7,<8'
          # Generate SBOM from the built wheel — covers the package + all
          # declared dependencies (which is zero for aiir, but proves it).
          # NOTE: --schema-version was removed in cyclonedx-bom v7; the tool
          # now emits the latest CycloneDX schema version automatically.
          mkdir -p sbom
          cyclonedx-py environment \
            --output-format json \
            --output-file sbom/aiir-sbom.cdx.json
          echo "✅ SBOM generated: $(wc -c < sbom/aiir-sbom.cdx.json) bytes"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: sbom
          path: sbom/

  # ── Step 3: Publish to PyPI ────────────────────────────────────────
  publish:
    needs: build
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write       # Required for OIDC Trusted Publisher
      attestations: write   # Required for SLSA provenance attestation
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          # Idempotent: if a tag is force-pushed after the version was already
          # published, skip rather than fail.  PyPI is immutable — same version
          # + same content is a no-op; different content is rejected regardless.
          skip-existing: true
          # PEP 740: Generate and upload digital attestations (SLSA provenance
          # + PyPI Publish predicates) for every wheel and sdist.  Requires
          # Trusted Publishing (OIDC) — no static API tokens or key management.
          # Attestations are signed with short-lived OIDC identities and can be
          # verified via PyPI's Integrity API.
          attestations: true
        # No API token needed — uses OIDC via Trusted Publisher config on PyPI

  # ── Step 3b: SLSA Provenance Attestation ───────────────────────────
  attest:
    needs: publish
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: dist
          path: dist/
      - name: Generate SLSA provenance attestation (wheel)
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd  # v2.3.0
        with:
          subject-path: 'dist/*.whl'
      - name: Generate SLSA provenance attestation (sdist)
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd  # v2.3.0
        with:
          subject-path: 'dist/*.tar.gz'

  # ── Step 4: Verify PyPI ────────────────────────────────────────────
  verify:
    needs: [publish, attest]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Wait for PyPI index propagation
        run: sleep 30
      - name: Verify package on PyPI
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for i in 1 2 3 4 5 6; do
            VERSION=$(curl -sf "https://pypi.org/pypi/aiir/json" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])" \
              2>/dev/null || echo "unknown")
            if [ "$VERSION" = "$TAG" ]; then
              echo "✅ PyPI verified: aiir==$TAG"
              exit 0
            fi
            echo "⏳ Attempt $i/6: PyPI has $VERSION, waiting for $TAG..."
            sleep 30
          done
          echo "::error::PyPI did not update to $TAG within 3 minutes"
          exit 1

      - name: Verify PEP 740 attestations via PyPI Integrity API
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "🔍 Checking PEP 740 attestations for aiir==$TAG..."

          # Fetch the release file list from PyPI JSON API
          FILES=$(curl -sf "https://pypi.org/pypi/aiir/${TAG}/json" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for url_info in data.get('urls', []):
              print(url_info['filename'])
          ")

          CHECKED=0
          ATTESTED=0
          for FILE in $FILES; do
            CHECKED=$((CHECKED + 1))
            echo "  Checking attestation for: $FILE"

            # Query the Integrity API for provenance attestations.
            # Endpoint: GET /integrity/aiir/<version>/<filename>/provenance
            HTTP_CODE=$(curl -s -o /tmp/provenance.json -w "%{http_code}" \
              "https://pypi.org/integrity/aiir/${TAG}/${FILE}/provenance" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              # Verify the response contains attestation bundles
              HAS_ATTESTATIONS=$(python3 -c "
          import sys, json
          try:
              data = json.load(open('/tmp/provenance.json'))
              attestations = data.get('attestation_bundles', data.get('attestations', []))
              print('yes' if attestations else 'no')
          except Exception:
              print('no')
          " 2>/dev/null || echo "no")

              if [ "$HAS_ATTESTATIONS" = "yes" ]; then
                ATTESTED=$((ATTESTED + 1))
                echo "    ✅ Attestation found"
              else
                echo "    ⚠️  200 OK but no attestation bundles in response"
              fi
            elif [ "$HTTP_CODE" = "404" ]; then
              echo "    ℹ️  No attestation yet (404) — may still be propagating"
            else
              echo "    ⚠️  Integrity API returned HTTP $HTTP_CODE"
            fi
          done

          echo ""
          echo "📊 Attestation summary: $ATTESTED/$CHECKED files attested"
          if [ "$ATTESTED" -eq "$CHECKED" ] && [ "$CHECKED" -gt 0 ]; then
            echo "✅ All release artifacts have PEP 740 attestations"
          elif [ "$ATTESTED" -gt 0 ]; then
            echo "⚠️  Partial attestation coverage ($ATTESTED/$CHECKED)"
          else
            echo "::warning::No PEP 740 attestations found — they may still be propagating"
          fi

  # ── Step 4b: Publish JS SDK to npm ───────────────────────────────────
  publish-npm:
    needs: preflight
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4.3.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Sync JS SDK version to release tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          cd sdks/js
          # Update package.json version to match the release tag.
          # Uses node to preserve JSON formatting.
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${TAG}';
            require('fs').writeFileSync(
              'package.json',
              JSON.stringify(pkg, null, 2) + '\n'
            );
          "
          echo "✅ JS SDK version set to ${TAG}"
          cat package.json | grep '"version"'
      - name: Publish to npm
        working-directory: sdks/js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # publishConfig.access = "public" is set in package.json,
          # but we pass --access public as belt-and-suspenders.
          npm publish --access public
          echo "✅ @invariantsystems/aiir@${GITHUB_REF_NAME#v} published to npm"

  # ── Step 6: Build & push Docker image to GHCR ──────────────────────
  docker:
    needs: verify
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75  # v6.9.0
        with:
          context: .
          push: true
          build-args: AIIR_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8ea63fd80e  # v0.28.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

  # ── Step 7: Propagate version to website ───────────────────────────
  update-website:
    needs: [verify, docker, publish-npm]
    timeout-minutes: 5
    runs-on: ubuntu-latest
    # Non-blocking: website has a 6-hour self-heal schedule as backup
    continue-on-error: true
    steps:
      - name: Trigger website version bump
        # WEBSITE_DISPATCH_TOKEN: fine-grained PAT scoped to:
        #   - repo: invariant-systems-ai/invariantsystems.io
        #   - permissions: contents:read + metadata:read (dispatch only)
        # Rotate every 90 days.  If absent, the website self-heals on
        # its 6-hour cron schedule — this step is an accelerator, not
        # a hard dependency.
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::WEBSITE_DISPATCH_TOKEN not set — website will self-heal within 6 hours"
            exit 0
          fi
          TAG="${GITHUB_REF_NAME#v}"
          gh api "repos/invariant-systems-ai/invariantsystems.io/dispatches" \
            -f event_type=version-bump \
            -f "client_payload[version]=$TAG"
          echo "✅ Dispatched version-bump ($TAG) to invariantsystems.io"
