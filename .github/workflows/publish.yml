# Publish to PyPI when a version tag is pushed.
#
# Single workflow handles the full pipeline:
#   1. Verify CI tests passed on the tagged commit (gate)
#   2. Verify tag matches __version__
#   3. Create GitHub Release (with auto-generated notes)
#   4. Build wheel + sdist
#   5. Publish to PyPI via OIDC Trusted Publisher
#   6. Verify PyPI has the version (retries 6×)
#   7. Build & push Docker image to GHCR
#
# NOTE: This is a single workflow instead of release→publish chaining
# because GitHub Actions won't trigger workflows from events created
# by the default GITHUB_TOKEN (to prevent infinite loops).
name: Publish

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

concurrency:
  group: publish-${{ github.ref_name }}
  # Never cancel a running publish — half-published state is worse than waiting
  cancel-in-progress: false

permissions:
  contents: write  # For creating the GitHub Release

jobs:
  # ── Gate: verify CI tests passed on this commit ────────────────────
  ci-gate:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI tests to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT="${GITHUB_SHA}"
          echo "⏳ Checking CI status for commit ${COMMIT:0:12}..."

          # Poll for up to 5 minutes — CI may still be running from
          # the push that created the tag.
          for i in $(seq 1 30); do
            # Get the combined status check result for this commit
            STATUS=$(gh api "repos/${{ github.repository }}/commits/${COMMIT}/status" \
              --jq '.state' 2>/dev/null || echo "unknown")

            # Also check for check-runs (Actions use check-runs, not statuses).
            # Filter for actual CI jobs only: "test (...)" matrix jobs and the
            # "ci-ok" rollup gate.  Exclude "smoke-test" (Action Health) which
            # runs independently and should not block publishing.
            CHECKS=$(gh api "repos/${{ github.repository }}/commits/${COMMIT}/check-runs" \
              --jq '[.check_runs[] | select(.name | test("^test \\(|^ci-ok$"; "i"))] | {total: length, success: [.[] | select(.conclusion == "success")] | length, pending: [.[] | select(.status != "completed")] | length}' \
              2>/dev/null || echo '{"total":0,"success":0,"pending":0}')

            TOTAL=$(echo "$CHECKS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('total',0))")
            SUCCESS=$(echo "$CHECKS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',0))")
            PENDING=$(echo "$CHECKS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('pending',0))")

            echo "  Attempt $i/30: total=$TOTAL success=$SUCCESS pending=$PENDING status=$STATUS"

            # Need at least 1 check, all successful, none pending
            if [ "$TOTAL" -gt 0 ] && [ "$SUCCESS" -eq "$TOTAL" ] && [ "$PENDING" -eq 0 ]; then
              echo "✅ CI gate passed: $SUCCESS/$TOTAL checks successful"
              exit 0
            fi

            # If any check failed (not pending, not success), fail fast
            FAILED=$(echo "$CHECKS" | python3 -c "
          import sys,json
          d = json.load(sys.stdin)
          f = d.get('total',0) - d.get('success',0) - d.get('pending',0)
          print(f)
          ")
            if [ "$FAILED" -gt 0 ]; then
              echo "::error::CI gate failed: $FAILED check(s) failed on ${COMMIT:0:12}"
              echo "See: https://github.com/${{ github.repository }}/commit/${COMMIT}"
              exit 1
            fi

            sleep 10
          done

          echo "::error::CI gate timed out — tests did not complete within 5 minutes for ${COMMIT:0:12}"
          echo "Push a new tag after CI passes, or re-run this workflow."
          exit 1

  # ── Gate: verify tag = code version ────────────────────────────────
  preflight:
    needs: ci-gate
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python3 -c "
          import re
          text = open('aiir/__init__.py').read()
          m = re.search(r'__version__\s*=\s*[\"\\x27]([^\"\\x27]+)', text)
          print(m.group(1))
          ")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag ($TAG) ≠ aiir/__init__.py ($PKG). Aborting."
            exit 1
          fi
          echo "✅ Tag matches: $TAG"

  # ── Step 1: Create GitHub Release ──────────────────────────────────
  release:
    needs: preflight
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent: if release exists, promote it to latest (un-prerelease).
          # This handles the case where a release was manually created as
          # pre-release or auto-detected as one — we always want tagged
          # semver releases to be full releases for Marketplace eligibility.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "ℹ️  Release $GITHUB_REF_NAME already exists — ensuring it is marked as latest"
            gh release edit "$GITHUB_REF_NAME" --prerelease=false --latest
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --verify-tag \
              --latest
            echo "✅ Release $GITHUB_REF_NAME created"
          fi

  # ── Step 2: Build sdist + wheel ────────────────────────────────────
  build:
    needs: preflight
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - name: Build
        run: pip install build && python -m build
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dist
          path: dist/

  # ── Step 3: Publish to PyPI ────────────────────────────────────────
  publish:
    needs: build
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # Required for OIDC Trusted Publisher
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          # Idempotent: if a tag is force-pushed after the version was already
          # published, skip rather than fail.  PyPI is immutable — same version
          # + same content is a no-op; different content is rejected regardless.
          skip-existing: true
        # No API token needed — uses OIDC via Trusted Publisher config on PyPI

  # ── Step 4: Verify PyPI ────────────────────────────────────────────
  verify:
    needs: publish
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Wait for PyPI index propagation
        run: sleep 30
      - name: Verify package on PyPI
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for i in 1 2 3 4 5 6; do
            VERSION=$(curl -sf "https://pypi.org/pypi/aiir/json" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])" \
              2>/dev/null || echo "unknown")
            if [ "$VERSION" = "$TAG" ]; then
              echo "✅ PyPI verified: aiir==$TAG"
              exit 0
            fi
            echo "⏳ Attempt $i/6: PyPI has $VERSION, waiting for $TAG..."
            sleep 30
          done
          echo "::error::PyPI did not update to $TAG within 3 minutes"
          exit 1

  # ── Step 5: Build & push Docker image to GHCR ──────────────────────
  docker:
    needs: verify
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75  # v6.9.0
        with:
          context: .
          push: true
          build-args: AIIR_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ── Step 6: Propagate version to website ───────────────────────────
  update-website:
    needs: [verify, docker]
    timeout-minutes: 5
    runs-on: ubuntu-latest
    # Non-blocking: website has a 6-hour self-heal schedule as backup
    continue-on-error: true
    steps:
      - name: Trigger website version bump
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::WEBSITE_DISPATCH_TOKEN not set — website will self-heal within 6 hours"
            exit 0
          fi
          TAG="${GITHUB_REF_NAME#v}"
          gh api "repos/invariant-systems-ai/invariantsystems.io/dispatches" \
            -f event_type=version-bump \
            -f "client_payload[version]=$TAG"
          echo "✅ Dispatched version-bump ($TAG) to invariantsystems.io"
