# OSSF Scorecard — supply chain security assessment.
#
# Runs weekly and on main pushes.  Publishes results to:
#   1. GitHub Security tab (SARIF upload)
#   2. OpenSSF REST API (public badge)
#
# This gives users a visible trust signal and surfaces supply chain
# risks (unpinned dependencies, missing branch protection, etc.).
name: Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Weekly Saturday 05:00 UTC
    - cron: '0 5 * * 6'
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # SARIF upload
      id-token: write         # Scorecard API
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46  # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
          # Do not fail the workflow on low scores — informational only.
          # The score appears on the OpenSSF badge and Security tab.

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169  # v3.28.0
        with:
          sarif_file: results.sarif
