# Sync GitHub → GitLab and verify all distribution channels are aligned.
#
# Triggers:
#   1. After "Publish" completes (success or failure) → mirror + verify
#   2. Daily at 06:00 UTC → catch any drift from manual edits or partial failures
#   3. Manual workflow_dispatch → on-demand health check
#
# Self-healing: if GitLab is behind, this workflow force-pushes to catch it up.
# If PyPI is behind, it alerts (can't re-push same version to PyPI).
name: Sync

on:
  push:
    branches: [main]
    tags-ignore: ['**']   # Tag pushes trigger via workflow_run from Publish
  workflow_run:
    workflows: ["Publish"]
    types: [completed]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: sync
  cancel-in-progress: false

permissions:
  contents: read
  issues: write      # Auto-create issue on drift

jobs:
  # ── Step 1: Mirror all branches + tags to GitLab ──────────────────
  mirror-gitlab:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to GitLab mirror
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@gitlab.com/invariant-systems/aiir.git" 2>/dev/null || true

          echo "⏳ Mirroring branches..."
          git push gitlab --all --force 2>&1 || echo "::warning::Branch push had issues"

          echo "⏳ Mirroring tags..."
          git push gitlab --tags --force 2>&1 || echo "::warning::Tag push had issues"

          echo "✅ Mirror complete"

  # ── Step 2: Verify all three channels agree ───────────────────────
  verify-sync:
    needs: mirror-gitlab
    if: always()
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check version alignment
        id: drift
        run: |
          set +e  # Don't exit on individual failures; we want to report all drift

          # ── Local version (source of truth) ──
          LOCAL=$(python3 -c "
          import re
          text = open('aiir/__init__.py').read()
          m = re.search(r'__version__\s*=\s*[\"\\x27]([^\"\\x27]+)', text)
          print(m.group(1))
          ")

          # ── Latest git tag (semver only, ignore floating v1/v2 tags) ──
          GH_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1 | sed 's/^v//' || echo "unknown")

          # ── PyPI version ──
          PYPI=$(curl -sf "https://pypi.org/pypi/aiir/json" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])" \
            2>/dev/null || echo "unknown")

          # ── GitLab latest tag (semver only, skip floating v1/v2 tags) ──
          GL_TAG=$(curl -sf "https://gitlab.com/api/v4/projects/80072388/repository/tags?order_by=version&sort=desc&per_page=20" \
            | python3 -c "
          import sys, json, re
          tags = json.load(sys.stdin)
          for t in tags:
              if re.match(r'^v\d+\.\d+\.\d+', t['name']):
                  print(t['name'].lstrip('v'))
                  break
          else:
              print('unknown')
          " 2>/dev/null || echo "unknown")

          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║        AIIR Distribution Health Check        ║"
          echo "╠══════════════════════════════════════════════╣"
          printf "║  %-20s  %-21s ║\n" "Source" "Version"
          echo "╠══════════════════════════════════════════════╣"
          printf "║  %-20s  %-21s ║\n" "__init__.py" "$LOCAL"
          printf "║  %-20s  %-21s ║\n" "GitHub tag" "$GH_TAG"
          printf "║  %-20s  %-21s ║\n" "PyPI" "$PYPI"
          printf "║  %-20s  %-21s ║\n" "GitLab tag" "$GL_TAG"
          echo "╚══════════════════════════════════════════════╝"
          echo ""

          DRIFT=0

          # Helper: compare MAJOR.MINOR.PATCH versions (stdlib only).
          # Returns "ahead", "behind", "equal", or "unknown".
          ver_cmp() {
            python3 -c "
          import sys
          a, b = sys.argv[1], sys.argv[2]
          if 'unknown' in (a, b):
              print('unknown'); sys.exit()
          try:
              ta = tuple(int(x) for x in a.split('.'))
              tb = tuple(int(x) for x in b.split('.'))
          except (ValueError, AttributeError):
              print('unknown'); sys.exit()
          if ta > tb:   print('ahead')
          elif ta < tb: print('behind')
          else:         print('equal')
          " "$1" "$2"
          }

          # __init__.py vs latest git tag
          LOCAL_VS_TAG=$(ver_cmp "$LOCAL" "$GH_TAG")
          if [ "$LOCAL_VS_TAG" = "behind" ]; then
            echo "::error title=Version regression::__init__.py ($LOCAL) is BEHIND latest git tag ($GH_TAG)"
            DRIFT=1
          elif [ "$LOCAL_VS_TAG" = "ahead" ]; then
            echo "::notice title=Pre-release::__init__.py ($LOCAL) is ahead of latest tag ($GH_TAG) — release pending"
          elif [ "$LOCAL_VS_TAG" = "unknown" ] && [ "$LOCAL" != "$GH_TAG" ]; then
            echo "::warning title=Version drift::__init__.py ($LOCAL) ≠ latest git tag ($GH_TAG)"
            DRIFT=1
          fi

          # PyPI vs source
          PYPI_VS_LOCAL=$(ver_cmp "$PYPI" "$LOCAL")
          if [ "$PYPI" != "unknown" ] && [ "$PYPI_VS_LOCAL" = "ahead" ]; then
            echo "::error title=PyPI drift::PyPI ($PYPI) is AHEAD of source ($LOCAL) — source may need a bump"
            DRIFT=1
          elif [ "$PYPI" != "unknown" ] && [ "$PYPI_VS_LOCAL" = "behind" ]; then
            echo "::notice title=PyPI pending::PyPI ($PYPI) is behind source ($LOCAL) — publish pending"
          elif [ "$PYPI" != "unknown" ] && [ "$PYPI_VS_LOCAL" = "unknown" ] && [ "$PYPI" != "$LOCAL" ]; then
            echo "::warning title=PyPI drift::PyPI ($PYPI) ≠ source ($LOCAL)"
            DRIFT=1
          fi

          # GitLab tag vs GitHub tag (these should always match after mirror)
          if [ "$GL_TAG" != "unknown" ] && [ "$GL_TAG" != "$GH_TAG" ]; then
            echo "::warning title=GitLab drift::GitLab ($GL_TAG) ≠ GitHub ($GH_TAG)"
            DRIFT=1
          fi

          if [ "$DRIFT" -eq 0 ]; then
            echo "✅ All channels in sync: v${LOCAL}"
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo ""
            echo "⚠️  DRIFT DETECTED — see warnings above"
            echo ""
            echo "Self-healing actions taken:"
            echo "  • GitLab mirror was force-pushed (branches + tags)"
            echo "  • PyPI cannot be self-healed (immutable). If behind, create a new release."
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "drift_summary=__init__.py=${LOCAL} GitHub=${GH_TAG} PyPI=${PYPI} GitLab=${GL_TAG}" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  # ── Step 3: Auto-create issue on drift ────────────────────────────
  alert-drift:
    needs: verify-sync
    if: failure()
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create or update drift issue
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --label "version-drift" --state open --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" \
              --body "🔄 Drift still detected — ${RUN_URL}"
            exit 0
          fi
          gh issue create --repo "${{ github.repository }}" \
            --title "🔄 Distribution channel version drift detected" \
            --label "version-drift,automated,P1" \
            --body "The Sync workflow detected version drift between distribution channels.

          **Run**: ${RUN_URL}

          Self-healing already attempted:
          - ✅ GitLab mirror force-pushed (branches + tags)
          - ❌ PyPI is immutable — if behind, a new patch release is needed

          Check the workflow run for the exact version table.

          *This issue was created automatically by the Sync workflow.*"
