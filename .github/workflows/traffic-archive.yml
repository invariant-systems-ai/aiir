# .github/workflows/traffic-archive.yml
# ────────────────────────────────────────────────────────────────────
# Archives GitHub traffic stats (clones + views) that are otherwise
# lost after 14 days.  Pushes a cumulative JSONL ledger to the
# `traffic-data` branch (never touches main).
#
# Requires: TRAFFIC_TOKEN (PAT with repo scope) — the default
# GITHUB_TOKEN cannot read traffic API data.
# ────────────────────────────────────────────────────────────────────
name: traffic-archive

on:
  schedule:
    - cron: "30 5 * * *"        # daily 05:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write                # push to traffic-data branch

jobs:
  archive:
    runs-on: ubuntu-latest
    if: github.repository == 'invariant-systems-ai/aiir'
    steps:
      - name: Skip when traffic token is unavailable
        if: ${{ secrets.TRAFFIC_TOKEN == '' }}
        run: |
          echo "TRAFFIC_TOKEN is not configured; skipping traffic archive run." >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@v4
        if: ${{ secrets.TRAFFIC_TOKEN != '' }}
        with:
          fetch-depth: 1

      - name: Initialise traffic-data branch
        if: ${{ secrets.TRAFFIC_TOKEN != '' }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Create or switch to the traffic-data branch.
          if git ls-remote --exit-code origin traffic-data >/dev/null 2>&1; then
            git fetch origin traffic-data
            git checkout traffic-data
          else
            git checkout --orphan traffic-data
            git rm -rf . 2>/dev/null || true
            echo '# Traffic archive' > README.md
            git add README.md
            git commit -m "init traffic-data branch"
          fi

      - name: Fetch traffic stats
        if: ${{ secrets.TRAFFIC_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          fetch_metric() {
            local label="$1"
            local path="$2"

            if ! gh api "$path"; then
              echo "Traffic API fetch failed for $label; skipping archive run." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
          }

          # Clones
          CLONES=$(fetch_metric clones repos/${{ github.repository }}/traffic/clones)
          echo "$CLONES" | jq -c --arg ts "$TS" '{fetched_at: $ts, metric: "clones"} + .' \
            >> data/clones.jsonl

          # Views
          VIEWS=$(fetch_metric views repos/${{ github.repository }}/traffic/views)
          echo "$VIEWS" | jq -c --arg ts "$TS" '{fetched_at: $ts, metric: "views"} + .' \
            >> data/views.jsonl

          # Referrers
          REFS=$(fetch_metric referrers repos/${{ github.repository }}/traffic/popular/referrers)
          echo "$REFS" | jq -c --arg ts "$TS" '{fetched_at: $ts, metric: "referrers", data: .}' \
            >> data/referrers.jsonl

          # Stars / forks snapshot
          REPO_SNAPSHOT=$(fetch_metric repo repos/${{ github.repository }})
          echo "$REPO_SNAPSHOT" | jq -c --arg ts "$TS" '{fetched_at: $ts, stars: .stargazers_count, forks: .forks_count, watchers: .subscribers_count}' \
            >> data/engagement.jsonl

          echo "### Traffic snapshot $TS" >> "$GITHUB_STEP_SUMMARY"
          echo "Clones (14d): $(echo "$CLONES" | jq .count)" >> "$GITHUB_STEP_SUMMARY"
          echo "Views  (14d): $(echo "$VIEWS"  | jq .count)" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit & push
        if: ${{ secrets.TRAFFIC_TOKEN != '' }}
        run: |
          git add data/
          git diff --cached --quiet && echo "No new data" && exit 0
          git commit -m "traffic: $(date -u +%Y-%m-%d)"
          git push origin traffic-data
