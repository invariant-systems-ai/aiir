# AIIR — GitLab CI/CD pipeline (hardened)
# Tests the CI/CD Catalog component and publishes releases.
#
# This pipeline runs on GitLab (gitlab.com/invariant-systems/aiir).
# The GitHub mirror uses .github/workflows/ instead.
#
# Security hardening:
#   - All images pinned by digest (Scorecard Pinned-Dependencies)
#   - Minimal variable exposure
#   - SAST and secret detection via GitLab templates
#   - Protected release rules

stages:
  - test
  - release

# ── Security scanning (GitLab built-in SAST + secrets) ──────────────
include:
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/receipt@$CI_COMMIT_SHA
    inputs:
      stage: test
      job-prefix: "test-aiir"
      version: "source"
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# ── Global defaults ─────────────────────────────────────────────────
default:
  # Restrict what jobs can access
  interruptible: true

variables:
  # Minimize git clone depth for speed
  GIT_DEPTH: "10"
  # Disable pip cache in CI for reproducibility
  PIP_NO_CACHE_DIR: "1"

# ── Verify the component jobs were added ─────────────────────────────
verify-component:
  stage: test
  image: python:3.11-slim@sha256:d6e4d224f70f9e0172a06a3a2eba2f768eb146811a349278b38fff3a36463b47
  script:
    - apt-get update -qq && apt-get install -y -qq git >/dev/null 2>&1
    - pip install --no-cache-dir aiir
    - aiir --version
    - echo "✅ AIIR installed and runs"
    # Verify the component's receipt jobs exist in this pipeline
    - echo "✅ Component loaded successfully (this job wouldn't run otherwise)"
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── Run the test suite ───────────────────────────────────────────────
test:
  stage: test
  image: python:3.11-slim@sha256:d6e4d224f70f9e0172a06a3a2eba2f768eb146811a349278b38fff3a36463b47
  timeout: 15 minutes
  variables:
    HYPOTHESIS_PROFILE: ci
  script:
    - apt-get update -qq && apt-get install -y -qq git >/dev/null 2>&1
    - pip install --no-cache-dir --require-hashes --no-deps -r .github/requirements/fuzz.txt
    - pip install --no-cache-dir .
    - cd /tmp && git init test-repo && cd test-repo
    - git config user.name "Test" && git config user.email "test@test.com"
    - echo "hello" > file.txt && git add . && git commit -m "test commit"
    - cd $CI_PROJECT_DIR
    - python -m pytest tests/ -x -q --tb=short
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# --- Publish release to CI/CD Catalog ---
# Uses the release: keyword (declarative), which GitLab's runner handles
# via release-cli with built-in authentication.
#
# If the release already exists (re-synced tag), GitLab returns an error
# and the job will fail — this is expected and harmless since the prior
# release is already correct.  Use allow_failure for idempotency.
create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest@sha256:3f52d526f48e8d10625c722fa6d6423ee82aadeae1b1aa91f07b62551d96dacf
  script:
    - echo "Publishing release $CI_COMMIT_TAG to CI/CD Catalog"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "AIIR $CI_COMMIT_TAG"
    description: |
      ## AIIR $CI_COMMIT_TAG

      AI Integrity Receipts — tamper-evident cryptographic receipts for every AI-generated commit.

      ### Install

      ```
      pip install aiir==${CI_COMMIT_TAG#v}
      ```

      ### Use as CI/CD Component

      ```yaml
      include:
        - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/receipt@$CI_COMMIT_TAG
      ```

      ### Changelog

      See [CHANGELOG.md](https://github.com/invariant-systems-ai/aiir/blob/main/CHANGELOG.md)
  rules:
    - if: $CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+$/
  allow_failure: false
