# AIIR — GitLab CI/CD pipeline
# Tests the CI/CD Catalog component and publishes releases.
#
# This pipeline runs on GitLab (gitlab.com/invariant-systems/aiir).
# The GitHub mirror uses .github/workflows/ instead.

stages:
  - test
  - release

# --- Test the component from the current commit ---
include:
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/receipt@$CI_COMMIT_SHA
    inputs:
      stage: test
      job-prefix: "test-aiir"
      version: "source"

# --- Verify the component jobs were added ---
verify-component:
  stage: test
  image: python:3.11-slim
  script:
    - apt-get update -qq && apt-get install -y -qq git >/dev/null 2>&1
    - pip install --quiet aiir
    - aiir --version
    - echo "✅ AIIR installed and runs"
    # Verify the component's receipt jobs exist in this pipeline
    - echo "✅ Component loaded successfully (this job wouldn't run otherwise)"
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# --- Run the test suite ---
test:
  stage: test
  image: python:3.11-slim
  timeout: 15 minutes
  variables:
    HYPOTHESIS_PROFILE: ci
  script:
    - apt-get update -qq && apt-get install -y -qq git >/dev/null 2>&1
    - pip install --quiet pytest hypothesis
    - pip install --quiet -e .
    - cd /tmp && git init test-repo && cd test-repo
    - git config user.name "Test" && git config user.email "test@test.com"
    - echo "hello" > file.txt && git add . && git commit -m "test commit"
    - cd $CI_PROJECT_DIR
    - python -m pytest tests/ -x -q --tb=short
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# --- Publish release to CI/CD Catalog ---
# Idempotent: if the release already exists (e.g. from a re-synced tag),
# the job succeeds immediately.  This prevents cascading failures when
# the GitHub→GitLab sync workflow force-pushes tags.
create-release:
  stage: release
  image: python:3.11-slim
  script:
    - |
      echo "Checking release status for $CI_COMMIT_TAG"

      # Check if release already exists (REST API with CI_JOB_TOKEN)
      STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}")

      if [ "$STATUS" = "200" ]; then
        echo "✅ Release $CI_COMMIT_TAG already exists — skipping"
        exit 0
      fi

      # Strip 'v' prefix for pip install version
      VERSION="${CI_COMMIT_TAG#v}"

      # Create release via REST API
      curl -s --fail \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{
          \"tag_name\": \"${CI_COMMIT_TAG}\",
          \"name\": \"AIIR ${CI_COMMIT_TAG}\",
          \"description\": \"## AIIR ${CI_COMMIT_TAG}\\n\\nAI Integrity Receipts — tamper-evident cryptographic receipts for every AI-generated commit.\\n\\n### Install\\n\\n\\\`\\\`\\\`\\npip install aiir==${VERSION}\\n\\\`\\\`\\\`\\n\\n### Use as CI/CD Component\\n\\n\\\`\\\`\\\`yaml\\ninclude:\\n  - component: ${CI_SERVER_FQDN}/${CI_PROJECT_PATH}/receipt@${CI_COMMIT_TAG}\\n\\\`\\\`\\\`\\n\\n### Changelog\\n\\nSee [CHANGELOG.md](https://github.com/invariant-systems-ai/aiir/blob/main/CHANGELOG.md)\"
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"

      echo ""
      echo "✅ Release $CI_COMMIT_TAG created"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+$/
  allow_failure: false
