# AIIR eats its own dogfood: every commit to this repo is receipted.
# Run `pre-commit install --hook-type post-commit` to enable.
repos:
  - repo: local
    hooks:
      - id: aiir
        name: AIIR — AI Integrity Receipt
        entry: python -m aiir --output .receipts/
        language: python
        always_run: true
        stages: [post-commit]
        pass_filenames: false
