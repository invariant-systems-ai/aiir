# typos configuration — https://github.com/crate-ci/typos
#
# SPDX-License-Identifier: Apache-2.0

[default]
extend-ignore-re = [
    # SHA hashes (40 or 64 hex chars)
    "[0-9a-fA-F]{40,64}",
    # Base64 encoded content
    "[A-Za-z0-9+/]{40,}={0,2}",
    # SPDX identifiers
    "SPDX-License-Identifier.*",
]

[default.extend-words]
# Domain-specific words that are not typos
aiir = "aiir"
intoto = "intoto"
oidc = "oidc"
nist = "nist"
slsa = "slsa"
ghcr = "ghcr"
sbom = "sbom"
vsa = "vsa"

[files]
extend-exclude = [
    "*.pyc",
    "*.json",
    "*.jsonl",
    "*.svg",
    "*.lock",
    ".git/",
    "__pycache__/",
    "mutants/",
    "dist/",
    "*.bundle",
]
