<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 600" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Menlo, Monaco, 'Courier New', monospace" font-size="13">
  <style>
    .bg { fill: #0d1117; }
    .titlebar { fill: #161b22; }
    .btn-close { fill: #ff5f57; }
    .btn-min { fill: #febc2e; }
    .btn-max { fill: #28c840; }
    .title { fill: #8b949e; font-size: 12px; }
    .prompt { fill: #7ee787; }
    .cmd { fill: #e6edf3; }
    .flag { fill: #79c0ff; }
    .comment { fill: #8b949e; }
    .border { fill: #58a6ff; }
    .label { fill: #8b949e; }
    .value { fill: #e6edf3; }
    .value-green { fill: #7ee787; }
    .value-blue { fill: #79c0ff; }
    .value-yellow { fill: #e3b341; }
    .hash { fill: #d2a8ff; }
    .dim { fill: #484f58; }
    .pip { fill: #ffa657; }
    .success { fill: #7ee787; }
    .tip { fill: #8b949e; }

    /* Sequential reveal animation */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .line1 { animation: fadeIn 0.3s ease-in 0.4s both; }
    .line2 { animation: fadeIn 0.3s ease-in 0.9s both; }
    .line3 { animation: fadeIn 0.3s ease-in 1.2s both; }
    .line4 { animation: fadeIn 0.3s ease-in 1.5s both; }
    .r1-1 { animation: fadeIn 0.15s ease-in 2.0s both; }
    .r1-2 { animation: fadeIn 0.15s ease-in 2.1s both; }
    .r1-3 { animation: fadeIn 0.15s ease-in 2.2s both; }
    .r1-4 { animation: fadeIn 0.15s ease-in 2.3s both; }
    .r1-5 { animation: fadeIn 0.15s ease-in 2.4s both; }
    .r1-6 { animation: fadeIn 0.15s ease-in 2.5s both; }
    .r1-7 { animation: fadeIn 0.15s ease-in 2.6s both; }
    .r1-8 { animation: fadeIn 0.15s ease-in 2.7s both; }
    .r1-9 { animation: fadeIn 0.15s ease-in 2.8s both; }
    .r2-1 { animation: fadeIn 0.15s ease-in 3.1s both; }
    .r2-2 { animation: fadeIn 0.15s ease-in 3.2s both; }
    .r2-3 { animation: fadeIn 0.15s ease-in 3.3s both; }
    .r2-4 { animation: fadeIn 0.15s ease-in 3.4s both; }
    .r2-5 { animation: fadeIn 0.15s ease-in 3.5s both; }
    .r2-6 { animation: fadeIn 0.15s ease-in 3.6s both; }
    .footer { animation: fadeIn 0.3s ease-in 4.0s both; }
    .cursor { animation: blink 1s step-end infinite 4.3s; opacity: 0; }
  </style>

  <!-- Window chrome -->
  <rect class="bg" width="840" height="600" rx="10"/>
  <rect class="titlebar" width="840" height="36" rx="10"/>
  <rect class="bg" y="26" width="840" height="10"/>
  <circle class="btn-close" cx="20" cy="18" r="6"/>
  <circle class="btn-min" cx="40" cy="18" r="6"/>
  <circle class="btn-max" cx="60" cy="18" r="6"/>
  <text class="title" x="420" y="22" text-anchor="middle">Terminal — aiir v1.0.0</text>

  <!-- Line 1: pip install -->
  <g class="line1">
    <text y="62" x="16">
      <tspan class="prompt">$ </tspan><tspan class="pip">pip install</tspan><tspan class="cmd"> aiir</tspan>
    </text>
  </g>
  <g class="line2">
    <text y="80" x="16" class="comment">Successfully installed aiir-1.0.0</text>
  </g>

  <!-- Line 2: cd + aiir --pretty -->
  <g class="line3">
    <text y="108" x="16">
      <tspan class="prompt">$ </tspan><tspan class="cmd">cd my-project</tspan>
    </text>
  </g>
  <g class="line4">
    <text y="130" x="16">
      <tspan class="prompt">$ </tspan><tspan class="cmd">aiir</tspan><tspan class="flag"> --pretty</tspan>
    </text>
  </g>

  <!-- Receipt 1: AI-authored commit -->
  <g class="r1-1">
    <text y="162" x="16" class="border">┌─ Receipt: g1-c4dec856a3f8b2c1d4e5f6a7</text>
  </g>
  <g class="r1-2">
    <text y="180" x="16">
      <tspan class="border">│  </tspan><tspan class="label">Commit:  </tspan><tspan class="value">c4dec85630e1</tspan>
    </text>
  </g>
  <g class="r1-3">
    <text y="198" x="16">
      <tspan class="border">│  </tspan><tspan class="label">Subject: </tspan><tspan class="value">feat: add OAuth2 middleware</tspan>
    </text>
  </g>
  <g class="r1-4">
    <text y="216" x="16">
      <tspan class="border">│  </tspan><tspan class="label">Author:  </tspan><tspan class="value">Jane Dev &lt;jane@example.com&gt;</tspan>
    </text>
  </g>
  <g class="r1-5">
    <text y="234" x="16">
      <tspan class="border">│  </tspan><tspan class="label">Files:   </tspan><tspan class="value-blue">4 changed</tspan>
    </text>
  </g>
  <g class="r1-6">
    <text y="252" x="16">
      <tspan class="border">│  </tspan><tspan class="label">AI:      </tspan><tspan class="value-yellow">YES (copilot)</tspan>
    </text>
  </g>
  <g class="r1-7">
    <text y="270" x="16">
      <tspan class="border">│  </tspan><tspan class="label">Hash:    </tspan><tspan class="hash">sha256:c4dec856a3f8b2c1d4e5f6a7b8…</tspan>
    </text>
  </g>
  <g class="r1-8">
    <text y="288" x="16">
      <tspan class="border">│  </tspan><tspan class="label">Time:    </tspan><tspan class="value">2026-03-13T14:22:07Z</tspan>
    </text>
  </g>
  <g class="r1-9">
    <text y="306" x="16" class="border">└──────────────────────────────────────────</text>
  </g>

  <!-- Receipt 2: Human commit -->
  <g class="r2-1">
    <text y="334" x="16" class="border">┌─ Receipt: g1-a91b0e3f7d2c8a4e6b5f1d9c</text>
  </g>
  <g class="r2-2">
    <text y="352" x="16">
      <tspan class="border">│  </tspan><tspan class="label">Commit:  </tspan><tspan class="value">a91b0e3f7d2c</tspan>
    </text>
  </g>
  <g class="r2-3">
    <text y="370" x="16">
      <tspan class="border">│  </tspan><tspan class="label">Subject: </tspan><tspan class="value">fix: resolve token refresh race</tspan>
    </text>
  </g>
  <g class="r2-4">
    <text y="388" x="16">
      <tspan class="border">│  </tspan><tspan class="label">Author:  </tspan><tspan class="value">Jane Dev &lt;jane@example.com&gt;</tspan>
    </text>
  </g>
  <g class="r2-5">
    <text y="406" x="16">
      <tspan class="border">│  </tspan><tspan class="label">AI:      </tspan><tspan class="value-green">no</tspan>
    </text>
  </g>
  <g class="r2-6">
    <text y="424" x="16" class="dim">│  ...</text>
    <text y="442" x="16" class="border">└──────────────────────────────────────────</text>
  </g>

  <!-- Footer summary -->
  <g class="footer">
    <text y="474" x="16" class="success">✅ 2 receipts generated</text>
    <text y="494" x="16" class="tip">📝 Tip: add --sign for Sigstore cryptographic proof</text>
    <text y="524" x="16">
      <tspan class="prompt">$ </tspan><tspan class="cmd">aiir</tspan><tspan class="flag"> --verify</tspan><tspan class="cmd"> .receipts/receipt_c4dec856.json</tspan>
    </text>
    <text y="544" x="16" class="success">✅ All good — receipt is intact and untampered</text>
    <text y="574" x="16">
      <tspan class="prompt">$ </tspan>
    </text>
  </g>

  <!-- Blinking cursor -->
  <text y="574" x="30" class="cursor prompt">▋</text>
</svg>
