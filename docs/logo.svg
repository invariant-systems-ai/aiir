<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shield" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.90"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Shield / receipt shape — conveys security + documentation -->
  <path d="M256 96
           L384 144
           L384 272
           C384 344 332 400 256 432
           C180 400 128 344 128 272
           L128 144
           Z"
        fill="url(#shield)" opacity="0.15"/>

  <!-- Stylized "∞" / invariance symbol — rotated figure-8 -->
  <!-- Rendered as two interlocking loops that form a stable glyph -->
  <g transform="translate(256, 232)" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left loop -->
    <path d="M0,0 C-40,-56 -112,-56 -112,0 C-112,56 -40,56 0,0"/>
    <!-- Right loop -->
    <path d="M0,0 C40,-56 112,-56 112,0 C112,56 40,56 0,0"/>
  </g>

  <!-- Checkmark / receipt tick — offset below the infinity, inside a small circle -->
  <circle cx="256" cy="356" r="40" fill="#ffffff" opacity="0.2"/>
  <polyline points="238,356 252,370 278,344"
            fill="none" stroke="#ffffff" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Subtle bottom text for large renders (hidden at small sizes by design) -->
</svg>
