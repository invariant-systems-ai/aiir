# AIIR — AI Integrity Receipts for GitLab CI
#
# Add this to your .gitlab-ci.yml to receipt every merge request and push.
#
# Option A: Include this template directly
#
#   include:
#     - remote: 'https://raw.githubusercontent.com/invariant-systems-ai/aiir/v1.0.0/templates/gitlab-ci.yml'
#
# Option B: Copy the job definition into your pipeline
#
# The job generates receipts for all commits in the push or MR diff,
# detects AI authorship, and uploads receipt JSON as a CI artifact.
#
# Requirements: Python 3.9+ (available in python:3.11-slim image)
# Dependencies: Zero (aiir has no runtime dependencies)

.aiir-receipt:
  image: python:3.11-slim
  variables:
    # Pin to specific version for reproducibility
    AIIR_VERSION: "1.0.0"
  before_script:
    - pip install --quiet "aiir==${AIIR_VERSION}"
  artifacts:
    paths:
      - .aiir-receipts/
    expire_in: 90 days
    when: always

# Receipt every push to any branch
aiir-receipt-push:
  extends: .aiir-receipt
  stage: test
  script:
    - |
      if [ -n "$CI_COMMIT_BEFORE_SHA" ] && [ "$CI_COMMIT_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
        aiir --range "${CI_COMMIT_BEFORE_SHA}..${CI_COMMIT_SHA}" --output .aiir-receipts/ --pretty
      else
        aiir --output .aiir-receipts/ --pretty
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# Receipt every merge request diff
aiir-receipt-mr:
  extends: .aiir-receipt
  stage: test
  script:
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" --depth=100
    - aiir --range "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}..${CI_COMMIT_SHA}" --output .aiir-receipts/ --pretty
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
